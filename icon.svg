<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente verde esmeralda -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="115" fill="url(#grad1)"/>
  
  <!-- Globo terráqueo estilizado -->
  <g transform="translate(256, 200)" filter="url(#shadow)">
    <!-- Círculo del globo -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.95"/>
    
    <!-- Meridiano vertical -->
    <ellipse cx="0" cy="0" rx="25" ry="90" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8"/>
    
    <!-- Paralelos horizontales -->
    <ellipse cx="0" cy="0" rx="90" ry="25" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8"/>
    <ellipse cx="0" cy="-45" rx="70" ry="20" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
    <ellipse cx="0" cy="45" rx="70" ry="20" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
    
    <!-- Pin de ubicación en el globo -->
    <g transform="translate(40, -30)">
      <path d="M 0,-20 C -8,-20, -14,-14, -14,-6 C -14,4, 0,16, 0,20 C 0,16, 14,4, 14,-6 C 14,-14, 8,-20, 0,-20 Z" 
            fill="#ef4444" stroke="#ffffff" stroke-width="2"/>
      <circle cx="0" cy="-6" r="4" fill="#ffffff"/>
    </g>
  </g>
  
  <!-- Avión de papel decorativo -->
  <g transform="translate(340, 140) rotate(25)" opacity="0.9">
    <path d="M 0,0 L -15,-5 L -10,-2 L -15,5 Z" fill="#ffffff"/>
    <path d="M -10,-2 L -18,0 L -10,2 Z" fill="#ffffff" opacity="0.7"/>
  </g>
  
  <!-- Ruta de viaje punteada -->}
  <g opacity="0.7">
    <path d="M 120,320 Q 180,280, 256,300 T 390,320" 
          stroke="#ffffff" 
          stroke-width="5" 
          fill="none" 
          stroke-linecap="round"
          stroke-dasharray="8,12"/>
    
    <!-- Puntos en la ruta -->
    <circle cx="120" cy="320" r="8" fill="#ffffff"/>
    <circle cx="256" cy="300" r="8" fill="#ffffff"/>
    <circle cx="390" cy="320" r="8" fill="#ffffff"/>
  </g>
  
  <!-- Texto "TRAVIO" -->
  <text x="256" y="425" 
        font-family="Arial, sans-serif" 
        font-size="58" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="#ffffff" 
        opacity="0.98"
        letter-spacing="4">
    TRAVIO
  </text>
  
  <!-- Subtítulo "your trip mate" -->
  <text x="256" y="470" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="500" 
        text-anchor="middle" 
        fill="#d1fae5" 
        opacity="0.95"
        letter-spacing="2">
    your trip mate
  </text>
  
  <!-- Estrellas decorativas -->
  <g transform="translate(110, 130)" opacity="0.75">
    <path d="M 0,-6 L 1.5,-1.5 L 6,0 L 1.5,1.5 L 0,6 L -1.5,1.5 L -6,0 L -1.5,-1.5 Z" fill="#ffffff"/>
  </g>
  
  <g transform="translate(400, 180)" opacity="0.65">
    <path d="M 0,-5 L 1.2,-1.2 L 5,0 L 1.2,1.2 L 0,5 L -1.2,1.2 L -5,0 L -1.2,-1.2 Z" fill="#ffffff"/>
  </g>
  
  <g transform="translate(160, 400)" opacity="0.55">
    <path d="M 0,-4 L 1,-1 L 4,0 L 1,1 L 0,4 L -1,1 L -4,0 L -1,-1 Z" fill="#ffffff"/>
  </g>
</svg>
